<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-15-graphics" class="stage-graphics-layer hidden">
                    <!-- Dimensional Portal 1 -->
                    <circle cx="100" cy="60" r="18" fill="none" stroke="var(--accent-yellow)" stroke-width="3" class="portal">
                        <animate attributeName="r" values="18;22;18" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="100" cy="60" r="8" fill="var(--accent-yellow)" opacity="0.3">
                        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Dimensional Portal 2 -->
                    <circle cx="450" cy="220" r="18" fill="none" stroke="var(--accent-yellow)" stroke-width="3" class="portal">
                        <animate attributeName="r" values="22;18;22" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="450" cy="220" r="8" fill="var(--accent-yellow)" opacity="0.3">
                        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- Resource harvesting beam -->
                    <path d="M 100 60 Q 200 100 300 140 Q 400 180 450 220" fill="none" stroke="var(--accent-yellow)" stroke-width="4" opacity="0.6" class="harvesting-beam">
                        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
                    </path>
                    
                    <!-- Harvested resources -->
                    <circle cx="5" cy="5" r="3" fill="var(--accent-green)" class="resource-particle">
                        <animateMotion dur="4s" repeatCount="indefinite">
                            <mpath href="#harvest-path"/>
                        </animateMotion>
                    </circle>
                    <circle cx="5" cy="5" r="2" fill="var(--accent-purple)" class="resource-particle">
                        <animateMotion dur="4s" repeatCount="indefinite" begin="1s">
                            <mpath href="#harvest-path"/>
                        </animateMotion>
                    </circle>
                    <circle cx="5" cy="5" r="2.5" fill="var(--accent-teal)" class="resource-particle">
                        <animateMotion dur="4s" repeatCount="indefinite" begin="2s">
                            <mpath href="#harvest-path"/>
                        </animateMotion>
                    </circle>
                    <path id="harvest-path" d="M 100 60 Q 200 100 300 140 Q 400 180 450 220" fill="none" opacity="0"/>
                    <text x="275" y="280" text-anchor="middle" fill="var(--accent-yellow)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">INTERDIMENSIONAL HARVESTING</text>
                </g>
</svg>