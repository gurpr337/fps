<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-9-graphics" class="stage-graphics-layer hidden">
                    <!-- Gaming Keyboard -->
                    <rect x="180" y="240" width="120" height="30" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="2" rx="4" class="keyboard"/>
                    <!-- Keyboard Keys (simplified) -->
                    <rect x="185" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="195" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="205" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="215" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="225" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="235" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="245" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="255" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="265" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="275" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <rect x="285" y="245" width="8" height="8" fill="var(--accent-green)" rx="1" opacity="0.7"/>
                    <!-- Spacebar with RGB -->
                    <rect x="200" y="258" width="80" height="8" class="spacebar-rgb" rx="2">
                        <animate attributeName="fill" values="var(--accent-green);var(--accent-purple);var(--accent-teal);var(--accent-yellow);var(--accent-green)" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <!-- Gaming Mouse -->
                    <ellipse cx="130" cy="250" rx="15" ry="20" fill="var(--bg-primary)" stroke="var(--accent-purple)" stroke-width="2" class="gaming-mouse"/>
                    <!-- Mouse buttons -->
                    <ellipse cx="125" cy="240" rx="5" ry="8" fill="var(--accent-purple)" opacity="0.3"/>
                    <ellipse cx="135" cy="240" rx="5" ry="8" fill="var(--accent-purple)" opacity="0.3"/>
                    <!-- Mouse scroll wheel -->
                    <ellipse cx="130" cy="245" rx="2" ry="4" fill="var(--accent-yellow)"/>
                    <!-- Mouse RGB -->
                    <ellipse cx="130" cy="255" rx="8" ry="3" class="mouse-rgb">
                        <animate attributeName="fill" values="var(--accent-purple);var(--accent-green);var(--accent-teal);var(--accent-purple)" dur="2s" repeatCount="indefinite"/>
                    </ellipse>
                    <text x="240" y="285" text-anchor="middle" fill="var(--accent-green)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">RGB GAMING SETUP</text>
                </g>
</svg>