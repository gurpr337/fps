<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-4-graphics" class="stage-graphics-layer hidden">
                    <!-- Remove air cooler fan and replace CPU cooler with liquid cooling block -->
                    <rect x="180" y="90" width="60" height="60" fill="url(#liquidGradient)" stroke="var(--accent-teal)" stroke-width="3" rx="4" class="liquid-block"/>
                    <!-- Liquid cooling block detail -->
                    <rect x="185" y="95" width="50" height="50" fill="var(--accent-teal)" opacity="0.3" rx="2"/>
                    <circle cx="210" cy="120" r="15" fill="none" stroke="var(--accent-teal)" stroke-width="2"/>
                    <!-- Radiator (top of motherboard) -->
                    <rect x="100" y="20" width="120" height="15" fill="none" stroke="var(--accent-teal)" stroke-width="2" rx="2"/>
                    <rect x="105" y="22" width="110" height="11" fill="url(#liquidGradient)" opacity="0.4"/>
                    <!-- Radiator fins -->
                    <line x1="110" y1="22" x2="110" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="125" y1="22" x2="125" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="140" y1="22" x2="140" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="155" y1="22" x2="155" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="170" y1="22" x2="170" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="185" y1="22" x2="185" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <line x1="200" y1="22" x2="200" y2="33" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <!-- Tubes connecting radiator to CPU block -->
                    <path d="M 160 35 Q 170 50 180 90" fill="none" stroke="url(#liquidGradient)" stroke-width="5"/>
                    <path d="M 200 35 Q 210 50 240 90" fill="none" stroke="url(#liquidGradient)" stroke-width="5"/>
                    <!-- Moving coolant particles -->
                    <circle cx="5" cy="5" r="2" fill="var(--accent-teal)" class="coolant-particle" opacity="0.8">
                        <animateMotion dur="3s" repeatCount="indefinite">
                            <mpath href="#coolant-circuit"/>
                        </animateMotion>
                    </circle>
                    <circle cx="5" cy="5" r="1.5" fill="#00ffff" class="coolant-particle" opacity="0.9">
                        <animateMotion dur="3s" repeatCount="indefinite" begin="1s">
                            <mpath href="#coolant-circuit"/>
                        </animateMotion>
                    </circle>
                    <circle cx="5" cy="5" r="2.5" fill="var(--accent-teal)" class="coolant-particle" opacity="0.7">
                        <animateMotion dur="3s" repeatCount="indefinite" begin="2s">
                            <mpath href="#coolant-circuit"/>
                        </animateMotion>
                    </circle>
                    <!-- Invisible path for coolant flow -->
                    <path id="coolant-circuit" d="M 160 35 Q 170 50 180 90 Q 190 110 210 120 Q 230 110 240 90 Q 230 50 200 35 Q 180 30 160 35" fill="none" opacity="0"/>
                    <text x="160" y="15" text-anchor="middle" fill="var(--accent-teal)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">AIO LIQUID COOLING</text>
                </g>
</svg>