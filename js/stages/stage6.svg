<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-6-graphics" class="stage-graphics-layer hidden">
                    <!-- Computer Tower Case -->
                    <rect x="200" y="80" width="100" height="140" fill="url(#caseGradient)" stroke="var(--accent-teal)" stroke-width="3" rx="8" class="computer-tower"/>
                    <!-- Case Front Panel -->
                    <rect x="210" y="90" width="80" height="120" fill="none" stroke="var(--accent-teal)" stroke-width="1" rx="4" opacity="0.5"/>
                    <!-- Power Button -->
                    <circle cx="220" cy="100" r="5" fill="var(--accent-green)" class="power-button">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Front I/O Ports -->
                    <rect x="240" y="95" width="20" height="5" fill="var(--bg-primary)" rx="1"/>
                    <rect x="265" y="95" width="20" height="5" fill="var(--bg-primary)" rx="1"/>
                    <!-- Case Fans (front) -->
                    <circle cx="250" cy="130" r="15" fill="none" stroke="var(--accent-purple)" stroke-width="2"/>
                    <circle cx="250" cy="130" r="12" fill="var(--accent-purple)" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 130;360 250 130" dur="0.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="170" r="15" fill="none" stroke="var(--accent-purple)" stroke-width="2"/>
                    <circle cx="250" cy="170" r="12" fill="var(--accent-purple)" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 170;360 250 170" dur="0.6s" repeatCount="indefinite"/>
                    </circle>
                    <!-- GPU visible through side panel -->
                    <rect x="205" y="150" width="35" height="8" fill="var(--accent-green)" opacity="0.7" rx="2"/>
                    <rect x="205" y="152" width="35" height="2" class="gpu-rgb-glow">
                        <animate attributeName="fill" values="var(--accent-green);var(--accent-purple);var(--accent-teal);var(--accent-yellow);var(--accent-green)" dur="2s" repeatCount="indefinite"/>
                    </rect>
                    <!-- RAM RGB glow visible -->
                    <rect x="270" y="120" width="3" height="20" class="ram-rgb-glow">
                        <animate attributeName="fill" values="var(--accent-green);var(--accent-purple);var(--accent-teal);var(--accent-yellow);#ff0080;var(--accent-green)" dur="1.2s" repeatCount="indefinite"/>
                    </rect>
                    <!-- Liquid cooling radiator at top -->
                    <rect x="210" y="82" width="70" height="8" fill="var(--accent-teal)" opacity="0.6" rx="2"/>
                    <!-- Status LEDs -->
                    <circle cx="270" cy="100" r="2" fill="var(--accent-green)">
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="280" cy="100" r="2" fill="var(--accent-yellow)">
                        <animate attributeName="opacity" values="1;0.5;1" dur="1.3s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Hide motherboard components when tower is complete -->
                    <rect x="0" y="0" width="500" height="280" fill="var(--bg-primary)" opacity="0.95"/>
                    <text x="250" y="240" text-anchor="middle" fill="var(--accent-teal)" font-size="12" font-weight="bold" stroke="white" stroke-width="0.5">GAMING PC COMPLETE</text>
                </g>
</svg>