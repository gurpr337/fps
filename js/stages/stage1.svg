<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-1-graphics" class="stage-graphics-layer hidden">
                    <!-- GPU Card properly fitted in top PCIe slot -->
                    <rect x="60" y="165" width="140" height="22" fill="url(#gpuGradient)" stroke="var(--accent-green)" stroke-width="2" rx="3" class="gpu-card"/>
                    <!-- GPU Heatsink (beefy) -->
                    <rect x="65" y="160" width="130" height="8" fill="silver" stroke="var(--accent-green)" stroke-width="1" rx="2"/>
                    <rect x="70" y="155" width="120" height="6" fill="silver" stroke="var(--accent-green)" stroke-width="1" rx="1" opacity="0.8"/>
                    <rect x="75" y="150" width="110" height="4" fill="silver" stroke="var(--accent-green)" stroke-width="1" rx="1" opacity="0.6"/>
                    <!-- GPU Cooling Fans (larger and more prominent) -->
                    <circle cx="100" cy="176" r="12" fill="none" stroke="var(--accent-green)" stroke-width="2"/>
                    <circle cx="100" cy="176" r="9" fill="var(--accent-green)" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" values="0 100 176;360 100 176" dur="0.3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="160" cy="176" r="12" fill="none" stroke="var(--accent-green)" stroke-width="2"/>
                    <circle cx="160" cy="176" r="9" fill="var(--accent-green)" opacity="0.3">
                        <animateTransform attributeName="transform" type="rotate" values="0 160 176;360 160 176" dur="0.4s" repeatCount="indefinite"/>
                    </circle>
                    <!-- GPU RGB LEDs -->
                    <rect x="65" y="168" width="130" height="4" class="gpu-rgb">
                        <animate attributeName="fill" values="var(--accent-green);var(--accent-purple);var(--accent-teal);var(--accent-yellow);var(--accent-green)" dur="2s" repeatCount="indefinite"/>
                    </rect>
                    <!-- Power connectors (dual 8-pin) -->
                    <rect x="205" y="170" width="8" height="12" fill="var(--accent-yellow)" rx="1"/>
                    <rect x="215" y="170" width="8" height="12" fill="var(--accent-yellow)" rx="1"/>
                    <!-- GPU brand text -->
                    <text x="130" y="145" text-anchor="middle" fill="var(--accent-green)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">RTX 4090 GPU</text>
                </g>
</svg>