<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-16-graphics" class="stage-graphics-layer hidden">
                    <!-- Time Control Device -->
                    <rect x="20" y="20" width="80" height="60" fill="var(--bg-primary)" stroke="var(--accent-teal)" stroke-width="2" rx="4" class="time-device"/>
                    <!-- Clock faces showing different times -->
                    <circle cx="40" cy="40" r="15" fill="none" stroke="var(--accent-teal)" stroke-width="2" class="clock-face"/>
                    <line x1="40" y1="40" x2="40" y2="30" stroke="var(--accent-teal)" stroke-width="2" class="clock-hand">
                        <animateTransform attributeName="transform" type="rotate" values="0 40 40;360 40 40" dur="8s" repeatCount="indefinite"/>
                    </line>
                    <line x1="40" y1="40" x2="40" y2="28" stroke="var(--accent-teal)" stroke-width="1" class="clock-hand">
                        <animateTransform attributeName="transform" type="rotate" values="0 40 40;360 40 40" dur="1s" repeatCount="indefinite"/>
                    </line>
                    
                    <circle cx="70" cy="60" r="15" fill="none" stroke="var(--accent-teal)" stroke-width="2" class="clock-face"/>
                    <line x1="70" y1="60" x2="70" y2="50" stroke="var(--accent-teal)" stroke-width="2" class="clock-hand">
                        <animateTransform attributeName="transform" type="rotate" values="180 70 60;540 70 60" dur="8s" repeatCount="indefinite"/>
                    </line>
                    <line x1="70" y1="60" x2="70" y2="48" stroke="var(--accent-teal)" stroke-width="1" class="clock-hand">
                        <animateTransform attributeName="transform" type="rotate" values="180 70 60;540 70 60" dur="1s" repeatCount="indefinite"/>
                    </line>
                    
                    <!-- Time distortion waves -->
                    <circle cx="55" cy="50" r="25" fill="none" stroke="var(--accent-teal)" stroke-width="1" opacity="0.3">
                        <animate attributeName="r" values="25;35;25" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="55" cy="50" r="35" fill="none" stroke="var(--accent-teal)" stroke-width="1" opacity="0.3">
                        <animate attributeName="r" values="35;45;35" dur="3s" repeatCount="indefinite" begin="1s"/>
                        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" begin="1s"/>
                    </circle>
                    <text x="55" y="95" text-anchor="middle" fill="var(--accent-teal)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">TIME SYNC</text>
                </g>
</svg>