<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-19-graphics" class="stage-graphics-layer hidden">
                    <!-- Central Singularity -->
                    <circle cx="250" cy="140" r="8" fill="var(--accent-yellow)" class="singularity">
                        <animate attributeName="r" values="8;12;8" dur="1s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Event Horizon -->
                    <circle cx="250" cy="140" r="40" fill="none" stroke="var(--accent-yellow)" stroke-width="3" opacity="0.5" class="event-horizon">
                        <animate attributeName="r" values="40;45;40" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="140" r="60" fill="none" stroke="var(--accent-yellow)" stroke-width="2" opacity="0.3" class="gravity-well">
                        <animate attributeName="r" values="60;70;60" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="140" r="80" fill="none" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.2" class="gravity-well">
                        <animate attributeName="r" values="80;90;80" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Matter being pulled in -->
                    <circle cx="170" cy="80" r="3" fill="var(--accent-green)" class="matter-particle">
                        <animateMotion dur="5s" repeatCount="indefinite">
                            <mpath href="#spiral-path1"/>
                        </animateMotion>
                        <animate attributeName="r" values="3;1;3" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="330" cy="200" r="3" fill="var(--accent-purple)" class="matter-particle">
                        <animateMotion dur="6s" repeatCount="indefinite" begin="1s">
                            <mpath href="#spiral-path2"/>
                        </animateMotion>
                        <animate attributeName="r" values="3;1;3" dur="6s" repeatCount="indefinite" begin="1s"/>
                    </circle>
                    <circle cx="180" cy="220" r="3" fill="var(--accent-teal)" class="matter-particle">
                        <animateMotion dur="4.5s" repeatCount="indefinite" begin="2s">
                            <mpath href="#spiral-path3"/>
                        </animateMotion>
                        <animate attributeName="r" values="3;1;3" dur="4.5s" repeatCount="indefinite" begin="2s"/>
                    </circle>
                    <circle cx="320" cy="60" r="3" fill="var(--accent-yellow)" class="matter-particle">
                        <animateMotion dur="5.5s" repeatCount="indefinite" begin="3s">
                            <mpath href="#spiral-path4"/>
                        </animateMotion>
                        <animate attributeName="r" values="3;1;3" dur="5.5s" repeatCount="indefinite" begin="3s"/>
                    </circle>
                    <!-- Spiral paths (simplified) -->
                    <path id="spiral-path1" d="M 170 80 Q 200 100 230 120 Q 240 130 250 140" fill="none" opacity="0"/>
                    <path id="spiral-path2" d="M 330 200 Q 300 180 270 160 Q 260 150 250 140" fill="none" opacity="0"/>
                    <path id="spiral-path3" d="M 180 220 Q 210 200 240 170 Q 245 155 250 140" fill="none" opacity="0"/>
                    <path id="spiral-path4" d="M 320 60 Q 290 80 260 110 Q 255 125 250 140" fill="none" opacity="0"/>
                    <text x="250" y="20" text-anchor="middle" fill="var(--accent-yellow)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">REALITY SINGULARITY</text>
                </g>
</svg>