<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-0-graphics" class="stage-graphics-layer">
                    <!-- Main Motherboard -->
                    <rect x="50" y="40" width="400" height="200" fill="url(#motherboardGradient)" stroke="var(--accent-teal)" stroke-width="2" rx="8" class="motherboard"/>
                    <!-- PCB traces -->
                    <line x1="60" y1="60" x2="440" y2="60" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="60" y1="80" x2="440" y2="80" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="60" y1="100" x2="440" y2="100" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="80" y1="50" x2="80" y2="230" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="150" y1="50" x2="150" y2="230" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="250" y1="50" x2="250" y2="230" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <line x1="350" y1="50" x2="350" y2="230" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.6"/>
                    <!-- CPU Socket -->
                    <rect x="180" y="100" width="60" height="60" fill="var(--bg-primary)" stroke="var(--accent-teal)" stroke-width="2" rx="4"/>
                    <rect x="185" y="105" width="50" height="50" fill="none" stroke="var(--accent-teal)" stroke-width="1" opacity="0.5"/>
                    <!-- RAM Slots -->
                    <rect x="300" y="70" width="12" height="80" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <rect x="320" y="70" width="12" height="80" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <rect x="340" y="70" width="12" height="80" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <rect x="360" y="70" width="12" height="80" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <!-- PCIe Slots -->
                    <rect x="60" y="170" width="150" height="12" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <rect x="60" y="200" width="150" height="8" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <rect x="60" y="220" width="150" height="8" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="1"/>
                    <!-- Power connectors -->
                    <rect x="400" y="80" width="30" height="20" fill="var(--accent-yellow)" stroke="var(--accent-yellow)" stroke-width="1" rx="2"/>
                    <rect x="400" y="120" width="15" height="30" fill="var(--accent-yellow)" stroke="var(--accent-yellow)" stroke-width="1" rx="2"/>
                    <!-- Status LEDs -->
                    <circle cx="420" cy="60" r="2" fill="var(--accent-green)">
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="430" cy="60" r="2" fill="var(--accent-yellow)">
                        <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
                    </circle>
                    <text x="250" y="270" text-anchor="middle" fill="var(--accent-teal)" font-size="12" font-weight="bold" stroke="white" stroke-width="0.5">MOTHERBOARD INITIALIZED</text>
                </g>
</svg>