<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-14-graphics" class="stage-graphics-layer hidden">
                    <!-- Universe Portal 1 -->
                    <rect x="20" y="40" width="60" height="40" fill="var(--bg-primary)" stroke="var(--accent-green)" stroke-width="2" rx="5" class="universe-window">
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="25" y="45" width="50" height="30" fill="#001100" rx="2"/>
                    <rect x="30" y="50" width="10" height="10" fill="var(--accent-green)" rx="1"/>
                    <rect x="45" y="55" width="8" height="8" fill="var(--accent-yellow)" rx="1"/>
                    <text x="50" y="95" text-anchor="middle" fill="var(--accent-green)" font-size="8" stroke="white" stroke-width="0.3">Universe A</text>
                    
                    <!-- Universe Portal 2 -->
                    <rect x="20" y="120" width="60" height="40" fill="var(--bg-primary)" stroke="var(--accent-purple)" stroke-width="2" rx="5" class="universe-window">
                        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="25" y="125" width="50" height="30" fill="#110011" rx="2"/>
                    <rect x="30" y="130" width="12" height="8" fill="var(--accent-purple)" rx="1"/>
                    <rect x="50" y="140" width="6" height="6" fill="var(--accent-teal)" rx="1"/>
                    <text x="50" y="175" text-anchor="middle" fill="var(--accent-purple)" font-size="8" stroke="white" stroke-width="0.3">Universe B</text>
                    
                    <!-- Universe Portal 3 -->
                    <rect x="20" y="200" width="60" height="40" fill="var(--bg-primary)" stroke="var(--accent-teal)" stroke-width="2" rx="5" class="universe-window">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="25" y="205" width="50" height="30" fill="#001111" rx="2"/>
                    <rect x="35" y="210" width="8" height="12" fill="var(--accent-teal)" rx="1"/>
                    <rect x="50" y="215" width="10" height="8" fill="var(--accent-yellow)" rx="1"/>
                    <text x="50" y="255" text-anchor="middle" fill="var(--accent-teal)" font-size="8" stroke="white" stroke-width="0.3">Universe C</text>
                    
                    <!-- Data streams between universes -->
                    <path d="M 80 60 Q 100 80 120 100" fill="none" stroke="var(--accent-green)" stroke-width="2" opacity="0.5">
                        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
                    </path>
                    <path d="M 80 140 Q 100 120 120 100" fill="none" stroke="var(--accent-purple)" stroke-width="2" opacity="0.5">
                        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
                    </path>
                    <text x="50" y="280" text-anchor="middle" fill="var(--accent-yellow)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">MULTIVERSE FARM</text>
                </g>
</svg>