<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-12-graphics" class="stage-graphics-layer hidden">
                    <!-- Gravity Well -->
                    <circle cx="250" cy="50" r="40" fill="none" stroke="var(--accent-yellow)" stroke-width="3" opacity="0.5" class="gravity-well">
                        <animate attributeName="r" values="40;45;40" dur="4s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="50" r="25" fill="none" stroke="var(--accent-yellow)" stroke-width="2" opacity="0.3">
                        <animate attributeName="r" values="25;30;25" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="50" r="10" fill="none" stroke="var(--accent-yellow)" stroke-width="1" opacity="0.2">
                        <animate attributeName="r" values="10;15;10" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Gravitational Core -->
                    <circle cx="250" cy="50" r="5" fill="var(--accent-yellow)" class="gravity-core">
                        <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Data being compressed -->
                    <rect x="200" y="30" width="4" height="4" fill="var(--accent-green)" class="data-chunk">
                        <animateTransform attributeName="transform" type="scale" values="1;0.1;1" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="x" values="200;245;200" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="280" y="40" width="4" height="4" fill="var(--accent-purple)" class="data-chunk">
                        <animateTransform attributeName="transform" type="scale" values="1;0.1;1" dur="3s" repeatCount="indefinite" begin="1s"/>
                        <animate attributeName="x" values="280;255;280" dur="3s" repeatCount="indefinite" begin="1s"/>
                    </rect>
                    <rect x="220" y="80" width="4" height="4" fill="var(--accent-teal)" class="data-chunk">
                        <animateTransform attributeName="transform" type="scale" values="1;0.1;1" dur="3s" repeatCount="indefinite" begin="2s"/>
                        <animate attributeName="x" values="220;245;220" dur="3s" repeatCount="indefinite" begin="2s"/>
                    </rect>
                    <text x="250" y="105" text-anchor="middle" fill="var(--accent-yellow)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">GRAVITY COMPRESSION</text>
                </g>
</svg>