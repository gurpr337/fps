<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-11-graphics" class="stage-graphics-layer hidden">
                    <!-- Central AI Core -->
                    <circle cx="50" cy="140" r="20" fill="url(#galaxyGradient)" stroke="var(--accent-green)" stroke-width="2" class="ai-core">
                        <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Neural Network Nodes -->
                    <circle cx="50" cy="140" r="6" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="80" cy="120" r="4" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="80" cy="160" r="4" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="0.8s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="110" cy="100" r="4" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="110" cy="140" r="4" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="1;0.6;1" dur="1.1s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="110" cy="180" r="4" fill="var(--accent-green)" class="neural-node">
                        <animate attributeName="opacity" values="0.8;1;0.8" dur="0.9s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Neural Connections -->
                    <line x1="50" y1="140" x2="80" y2="120" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="50" y1="140" x2="80" y2="160" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
                    </line>
                    <line x1="80" y1="120" x2="110" y2="100" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite"/>
                    </line>
                    <line x1="80" y1="160" x2="110" y2="180" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
                    </line>
                    <line x1="80" y1="120" x2="110" y2="140" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
                    </line>
                    <line x1="80" y1="160" x2="110" y2="140" stroke="var(--accent-green)" stroke-width="1" opacity="0.6">
                        <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite"/>
                    </line>
                    <!-- Data processing visualization -->
                    <circle cx="70" cy="130" r="2" fill="var(--accent-yellow)" class="data-pulse">
                        <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
                    </circle>
                    <text x="50" y="210" text-anchor="middle" fill="var(--accent-green)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">AI NEURAL NETWORK</text>
                </g>
</svg>