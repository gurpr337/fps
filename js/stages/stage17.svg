<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
<defs>
                    <linearGradient id="motherboardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#006400;stop-opacity:0.8"/>
                        <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.6"/>
                    </linearGradient>
                    <linearGradient id="gpuGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-green);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:#004d1a;stop-opacity:1"/>
                    </linearGradient>
                    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-purple);stop-opacity:0.3"/>
                    </radialGradient>
                    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                        <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.6"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <linearGradient id="caseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--bg-primary);stop-opacity:1"/>
                        <stop offset="100%" style="stop-color:var(--accent-teal);stop-opacity:0.8"/>
                    </linearGradient>
                    <radialGradient id="galaxyGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--accent-purple);stop-opacity:0.4"/>
                        <stop offset="100%" style="stop-color:var(--bg-primary);stop-opacity:0.1"/>
                    </radialGradient>
                </defs>
<g id="stage-17-graphics" class="stage-graphics-layer hidden">
                    <!-- Galaxy background -->
                    <rect x="0" y="0" width="500" height="280" fill="url(#galaxyGradient)" opacity="0.2" class="galaxy-background"/>
                    <!-- Central astro-quantum processor -->
                    <circle cx="250" cy="140" r="25" fill="var(--accent-yellow)" stroke="var(--accent-purple)" stroke-width="3" class="astro-quantum-core">
                        <animate attributeName="r" values="25;30;25" dur="3s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Orbiting quantum satellites -->
                    <circle cx="280" cy="140" r="5" fill="var(--accent-teal)" class="quantum-satellite">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 140;360 250 140" dur="4s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="220" cy="140" r="5" fill="var(--accent-green)" class="quantum-satellite">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 140;-360 250 140" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="110" r="5" fill="var(--accent-purple)" class="quantum-satellite">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 140;360 250 140" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="250" cy="170" r="5" fill="var(--accent-yellow)" class="quantum-satellite">
                        <animateTransform attributeName="transform" type="rotate" values="0 250 140;-360 250 140" dur="3.5s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Stellar connections -->
                    <line x1="100" y1="100" x2="220" y2="120" stroke="var(--accent-yellow)" stroke-width="2" opacity="0.4">
                        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <line x1="400" y1="180" x2="280" y2="160" stroke="var(--accent-yellow)" stroke-width="2" opacity="0.4">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <text x="250" y="200" text-anchor="middle" fill="var(--accent-yellow)" font-size="10" font-weight="bold" stroke="white" stroke-width="0.5">ASTRO-QUANTUM CORE</text>
                </g>
</svg>